name: CI - Compose & Newman

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  compose-test:
    runs-on: ubuntu-latest
    services: {}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and start compose stack
        uses: docker/compose-action@v2
        with:
          args: up -d --build

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run Newman tests
        run: |
          npm ci
          npx -y newman@latest run postman/collections/FIT4110_lab05_iot_compose.postman_collection.json --environment postman/environments/FIT4110_lab05_local.postman_environment.json --reporters cli,json --reporter-json-export reports/newman-ci.json

      - name: Tear down Compose
        if: always()
        run: docker compose down -v
