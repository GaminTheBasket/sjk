services:
  # Service API FastAPI
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fit4110-api-lab05
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    networks:
      - team-internal
      - class-net
    ports:
      - "${APP_PORT:-8000}:8000"
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8020/health', timeout=3).read()" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # PostgreSQL database service
  db:
    image: postgres:15-alpine
    container_name: fit4110-db-lab05
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lab05}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lab05pass}
      POSTGRES_DB: ${POSTGRES_DB:-iotdb}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - team-internal
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lab05}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # AI service mẫu dùng Python HTTP server hoặc FastAPI
  ai-service:
    build:
      context: .
      dockerfile: Dockerfile.ai
    container_name: fit4110-ai-lab05
    networks:
      - team-internal
    ports:
      - "9000:9000"
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/health', timeout=3).read()" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  mqtt-broker:
    image: eclipse-mosquitto:2.0.17
    container_name: fit4110-mqtt-broker
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - team-internal
    healthcheck:
      test: [ "CMD", "sh", "-c", "nc -n -z 127.0.0.1 1883" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  analytics:
    build:
      context: .
      dockerfile: Dockerfile.analytics
    container_name: fit4110-analytics-lab05
    env_file:
      - .env
    depends_on:
      core-business:
        condition: service_started
    networks:
      - team-internal
    ports:
      - "8010:8010"
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health', timeout=3).read()" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  core-business:
    build:
      context: .
      dockerfile: Dockerfile.core
    container_name: fit4110-core-business-lab05
    networks:
      - team-internal
    ports:
      - "8020:8020"
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8020/health', timeout=3).read()" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  dashboard:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: fit4110-dashboard-lab05
    ports:
      - "8080:80"
    networks:
      - team-internal
    depends_on:
      - core-business

networks:
  team-internal:
    driver: bridge
  class-net:
    driver: bridge

volumes:
  db-data:
